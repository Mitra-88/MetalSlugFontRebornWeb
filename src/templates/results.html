<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>MetalSlugFontReborn Results</title>
    <link rel="stylesheet" href="/static/css/results.css">
    <link rel="icon" href="/static/assets/icons/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/static/manifest.json">
    <script src="/static/js/minified/redirect.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#090d17">
    <meta name="description" content="A tool for creating images with the Metal Slug font.">
    <meta name="keywords" content="Metal Slug, Metal Slug Font, Metal Slug Font Reborn">
    <meta name="author" content="Mitra88, AmbitiousFlowDev">
    <meta property="og:title" content="MetalSlugFontReborn">
    <meta property="og:description" content="A tool for creating images with the Metal Slug font.">
    <meta property="og:image" content="/static/assets/icons/logo.png">
    <meta property="og:url" content="https://vermeil.pythonanywhere.com/results">
</head>
<body>
    <div class="page">

        <div class="back-link">
            <a href="/">MetalSlugFontReborn</a>
        </div>

        <h1>Results</h1>

        <div class="card">
            <div class="card-inner"></div>

            {% if output %}
                <img class="output-img" id="image" src="{{ output }}" alt="Generated Metal Slug text" />
                <a class="download-btn" href="{{ output }}" download>Download</a>
            {% else %}
                <p class="empty-msg">No result found. Return to the <a href="/">home page</a> to generate one.</p>
            {% endif %}
        </div>

    </div>
</body>
</html>
